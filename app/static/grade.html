<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Trial Studio — Grade</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: system-ui, -apple-system, sans-serif; background:#0d0d11; color:#ececf0; display:flex; justify-content:center; }
  .wrap { width:100%; max-width:820px; padding:30px 20px 80px; }
  h1 { font-weight:600; margin:0 0 4px; }
  .sub { color:#9a9aa6; margin:0 0 18px; font-size:14px; }
  .bar { display:flex; gap:14px; align-items:center; flex-wrap:wrap; background:#15151b; border:1px solid #262630; border-radius:12px; padding:14px; margin-bottom:18px; }
  .bar input { flex:1; min-width:160px; background:#0d0d11; color:#ececf0; border:1px solid #2f2f3a; border-radius:8px; padding:10px; font-size:14px; }
  button { border:0; border-radius:9px; padding:10px 14px; font-size:14px; font-weight:600; cursor:pointer; }
  .gen { background:#5b6cff; color:#fff; }
  button:disabled { opacity:.5; cursor:default; }
  .stats { font-size:13px; color:#9aa3c8; }
  .status { color:#9a9aa6; font-size:14px; margin:10px 2px; min-height:18px; }
  .card { background:#15151b; border:1px solid #262630; border-radius:12px; padding:16px 18px; margin-bottom:12px; transition:opacity .2s, border-color .2s; }
  .cap { white-space:pre-wrap; font-size:16px; line-height:1.45; }
  .meta { color:#7b7b88; font-size:12px; margin-top:8px; }
  .btns { display:flex; gap:8px; margin-top:12px; }
  .keep { background:#1f7a4d; color:#fff; } .kill { background:#7a2330; color:#fff; } .best { background:#3a3320; color:#ffd76a; }
  .card.kept { border-color:#1f7a4d; opacity:.55; } .card.killed { border-color:#7a2330; opacity:.4; }
  .card.bestmark { border-color:#ffd76a; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Grade</h1>
  <p class="sub">Generate a batch, then react: <b>keep</b> what you'd post, <b>kill</b> what flops, <b>⭐ best</b> for the standout. Every tap trains the engine on your taste.</p>
  <div class="bar">
    <input id="notes" placeholder="optional topic/nudge — e.g. gym, dating, money…" />
    <button class="gen" id="gen">Generate batch</button>
    <span class="stats" id="stats">0 grades</span>
  </div>
  <div class="status" id="status"></div>
  <div id="cards"></div>
</div>
<script>
let batch = [];
async function refreshStats() {
  try {
    const s = await (await fetch('/api/captions/stats')).json();
    document.getElementById('stats').textContent =
      `${s.total} grades · ${s.keeps} keep / ${s.kills} kill / ${s.pairs} pairwise`;
  } catch (e) {}
}
async function genBatch() {
  const btn = document.getElementById('gen'), st = document.getElementById('status');
  btn.disabled = true; st.textContent = 'Generating a fresh batch… (~20–30s)';
  document.getElementById('cards').innerHTML = '';
  try {
    const notes = document.getElementById('notes').value || null;
    const r = await fetch('/api/captions/generate', { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify({ notes, n: 8 }) });
    if (!r.ok) throw new Error((await r.text()).slice(0,200));
    batch = (await r.json()).candidates || [];
    st.textContent = `${batch.length} candidates — grade them.`;
    render();
  } catch (e) { st.textContent = 'Error: ' + e.message; }
  finally { btn.disabled = false; }
}
function ctx(c) { return { mode: c.mode, lever: c.primary_lever, notes: document.getElementById('notes').value || null }; }
function render() {
  const wrap = document.getElementById('cards'); wrap.innerHTML = '';
  batch.forEach((c, i) => {
    const card = document.createElement('div'); card.className = 'card';
    card.innerHTML = `<div class="cap"></div><div class="meta">${(c.mode||'')} · ${(c.primary_lever||'')}</div>
      <div class="btns"><button class="keep">keep</button><button class="kill">kill</button><button class="best">⭐ best</button></div>`;
    card.querySelector('.cap').textContent = c.text;
    card.querySelector('.keep').onclick = async () => { await post('/api/captions/grade', { caption:c.text, verdict:'keep', context:ctx(c) }); card.classList.remove('killed'); card.classList.add('kept'); refreshStats(); };
    card.querySelector('.kill').onclick = async () => { await post('/api/captions/grade', { caption:c.text, verdict:'kill', context:ctx(c) }); card.classList.remove('kept'); card.classList.add('killed'); refreshStats(); };
    card.querySelector('.best').onclick = async () => {
      for (let j=0;j<batch.length;j++) if (j!==i) await post('/api/captions/pairwise', { winner:c.text, loser:batch[j].text, context:ctx(c) });
      card.classList.add('bestmark'); refreshStats();
    };
    wrap.appendChild(card);
  });
}
async function post(url, body) { return fetch(url, { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify(body) }); }
document.getElementById('gen').onclick = genBatch;
refreshStats();
</script>
</body>
</html>
