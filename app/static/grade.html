<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Trial Studio — Grade</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: system-ui, -apple-system, sans-serif; background:#0d0d11; color:#ececf0; display:flex; justify-content:center; }
  .wrap { width:100%; max-width:820px; padding:28px 20px 90px; }
  h1 { font-weight:600; margin:0 0 4px; }
  .sub { color:#9a9aa6; margin:0 0 6px; font-size:14px; }
  .legend { color:#7b7b88; font-size:13px; line-height:1.5; margin:0 0 16px; }
  .legend b { color:#c4c4cf; }
  .bar { display:flex; gap:12px; align-items:center; flex-wrap:wrap; background:#15151b; border:1px solid #262630; border-radius:12px; padding:14px; position:sticky; top:8px; z-index:5; }
  .bar input { flex:1; min-width:160px; background:#0d0d11; color:#ececf0; border:1px solid #2f2f3a; border-radius:8px; padding:10px; font-size:14px; }
  button { border:0; border-radius:9px; padding:10px 14px; font-size:14px; font-weight:600; cursor:pointer; }
  .gen { background:#5b6cff; color:#fff; }
  button:disabled { opacity:.4; cursor:default; }
  .stats { font-size:13px; color:#9aa3c8; }
  .progress { font-size:13px; color:#9a9aa6; margin:10px 2px 0; }
  .status { color:#9a9aa6; font-size:14px; margin:8px 2px; min-height:18px; }
  .card { background:#15151b; border:1px solid #262630; border-radius:12px; padding:16px 18px; margin-bottom:12px; transition:opacity .15s, border-color .15s; }
  .cap { white-space:pre-wrap; font-size:16px; line-height:1.45; }
  .meta { color:#7b7b88; font-size:12px; margin-top:8px; }
  .note { width:100%; margin-top:10px; background:#0d0d11; color:#ececf0; border:1px solid #2f2f3a; border-radius:8px; padding:9px 10px; font-size:13px; }
  .btns { display:flex; gap:8px; margin-top:10px; }
  .keep { background:#23314a; color:#cfe0ff; } .kill { background:#3a2230; color:#ffd0d8; } .best { background:#33301f; color:#ffd76a; }
  .keep.on { background:#1f7a4d; color:#fff; } .kill.on { background:#7a2330; color:#fff; } .best.on { background:#caa42e; color:#1a1500; }
  .card.kept { border-color:#1f7a4d; } .card.killed { border-color:#7a2330; opacity:.6; } .card.bestmark { border-color:#ffd76a; }
  .next { width:100%; padding:15px; font-size:16px; background:#2a2a34; color:#ececf0; margin-top:8px; }
  .next.ready { background:#5b6cff; color:#fff; box-shadow:0 0 0 3px rgba(91,108,255,.25); }
</style>
</head>
<body>
<div class="wrap">
  <h1>Grade</h1>
  <p class="sub">Generate a batch, react to each, then hit Next batch.</p>
  <p class="legend">
    <b>keep</b> = you'd post it &nbsp;·&nbsp; <b>kill</b> = it missed (drop a note on <i>why</i> — that's the most useful part) &nbsp;·&nbsp;
    <b>⭐ best</b> = the single standout of the 8 — one tap, one record (the engine learns it beat the rest). Optional, one per batch.
  </p>
  <div class="bar">
    <input id="notes" placeholder="optional topic/nudge — e.g. gym, dating, money…" />
    <button class="gen" id="gen">Generate batch</button>
    <span class="stats" id="stats">0 grades</span>
  </div>
  <div class="progress" id="progress"></div>
  <div class="status" id="status"></div>
  <div id="cards"></div>
  <button class="next" id="next" style="display:none">Next batch →</button>
</div>
<script>
let batch = [], verdicts = [], busy = [], bestIdx = -1, bestBusy = false;

async function post(url, body) {
  return fetch(url, { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify(body) });
}
async function refreshStats() {
  try {
    const s = await (await fetch('/api/captions/stats')).json();
    document.getElementById('stats').textContent =
      `${s.total} grades · ${s.keeps} keep / ${s.kills} kill / ${s.best} best`;
  } catch (e) {}
}
function ctx(c) { return { mode:c.mode, lever:c.primary_lever, notes: document.getElementById('notes').value || null }; }
function updateProgress() {
  const n = verdicts.filter(Boolean).length;
  document.getElementById('progress').textContent = batch.length ? `graded ${n} / ${batch.length}` : '';
  document.getElementById('next').classList.toggle('ready', batch.length > 0 && n >= batch.length);
}
async function genBatch() {
  const btn = document.getElementById('gen'), st = document.getElementById('status'), next = document.getElementById('next');
  btn.disabled = true; next.style.display = 'none';
  st.textContent = 'Generating a fresh batch… (~20–30s)'; document.getElementById('cards').innerHTML = '';
  try {
    const notes = document.getElementById('notes').value || null;
    const r = await fetch('/api/captions/generate', { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify({ notes, n: 8 }) });
    if (!r.ok) throw new Error((await r.text()).slice(0, 200));
    batch = (await r.json()).candidates || [];
    verdicts = batch.map(() => null); busy = batch.map(() => false); bestIdx = -1; bestBusy = false;
    st.textContent = `${batch.length} candidates — react to each.`;
    render(); updateProgress();
    next.style.display = batch.length ? 'block' : 'none';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } catch (e) { st.textContent = 'Error: ' + e.message; }
  finally { btn.disabled = false; }
}
function render() {
  const wrap = document.getElementById('cards'); wrap.innerHTML = '';
  batch.forEach((c, i) => {
    const card = document.createElement('div'); card.className = 'card';
    card.innerHTML = `<div class="cap"></div><div class="meta">${(c.mode||'')} · ${(c.primary_lever||'')}</div>
      <input class="note" placeholder="optional note — why it hit, or specifically what missed" />
      <div class="btns"><button class="keep">keep</button><button class="kill">kill</button><button class="best">⭐ best</button></div>`;
    card.querySelector('.cap').textContent = c.text;
    const noteEl = card.querySelector('.note');
    const keepB = card.querySelector('.keep'), killB = card.querySelector('.kill'), bestB = card.querySelector('.best');
    keepB.onclick = () => setVerdict(i, 'keep', card, noteEl, keepB, killB);
    killB.onclick = () => setVerdict(i, 'kill', card, noteEl, keepB, killB);
    bestB.onclick = () => setBest(i, card, bestB);
  wrap.appendChild(card);
  });
}
async function setVerdict(i, verdict, card, noteEl, keepB, killB) {
  if (busy[i] || verdicts[i] === verdict) return;          // ignore double-click + no-op re-click
  busy[i] = true; keepB.disabled = killB.disabled = true;
  try { await post('/api/captions/grade', { caption: batch[i].text, verdict, note: noteEl.value || null, context: ctx(batch[i]) }); }
  finally { busy[i] = false; keepB.disabled = killB.disabled = false; }
  verdicts[i] = verdict;
  card.classList.toggle('kept', verdict === 'keep'); card.classList.toggle('killed', verdict === 'kill');
  keepB.classList.toggle('on', verdict === 'keep'); killB.classList.toggle('on', verdict === 'kill');
  updateProgress(); refreshStats();
}
async function setBest(i, card, bestB) {
  if (bestIdx !== -1 || bestBusy) return;                  // one ⭐ per batch, locked after first
  bestBusy = true;
  try { await post('/api/captions/best', { winner: batch[i].text, batch: batch.map(c => c.text), context: ctx(batch[i]) }); }
  finally { bestBusy = false; }
  bestIdx = i; bestB.classList.add('on'); card.classList.add('bestmark');
  document.querySelectorAll('.best').forEach(b => { if (b !== bestB) b.disabled = true; });
  refreshStats();
}
document.getElementById('gen').onclick = genBatch;
document.getElementById('next').onclick = genBatch;
refreshStats();
</script>
</body>
</html>
