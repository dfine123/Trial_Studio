<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>treelz.ai — sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root { color-scheme:dark;
    --bg:#0b0e13; --surface:#141922; --surface-2:#1a202b; --border:#222b38; --border-2:#303b4b;
    --ink:#e9eef6; --muted:#8a94a7; --faint:#5c6675;
    --blue:#4d8bff; --blue-bright:#73a4ff; --blue-deep:#2f63d6; --blue-soft:rgba(77,139,255,.13); --blue-glow:rgba(77,139,255,.45);
    --bad:#fa6d83; }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; color:var(--ink);
    font-family:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif; -webkit-font-smoothing:antialiased;
    background:radial-gradient(1100px 560px at 50% -10%, #16243b 0%, #0b0e13 60%); }
  .card { width:384px; max-width:92vw; background:var(--surface); border:1px solid var(--border); border-radius:20px;
    padding:38px 32px; box-shadow:0 28px 80px -24px rgba(0,0,0,.7); }
  .brand { display:flex; align-items:center; gap:13px; justify-content:center; margin-bottom:5px; }
  .brand img { width:46px; height:46px; border-radius:11px; }
  .brand h1 { font-size:26px; margin:0; font-weight:700; letter-spacing:-.7px; }
  .brand h1 span { color:var(--blue); }
  .sub { text-align:center; color:var(--muted); font-size:13.5px; margin:4px 0 28px; }
  label { display:block; font-size:12px; font-weight:550; color:var(--muted); margin:16px 0 7px; letter-spacing:.1px; }
  input { width:100%; background:var(--surface-2); color:var(--ink); font-family:inherit; border:1px solid var(--border);
    border-radius:11px; padding:13px; font-size:15px; transition:.15s; }
  input::placeholder { color:var(--faint); }
  input:hover { border-color:var(--border-2); }
  input:focus { outline:none; border-color:var(--blue); box-shadow:0 0 0 3px var(--blue-soft); }
  button { width:100%; margin-top:26px; padding:14px; font-size:15px; font-weight:650; font-family:inherit; border:0;
    border-radius:12px; color:#fff; cursor:pointer; transition:.16s;
    background:linear-gradient(180deg,var(--blue),var(--blue-deep)); box-shadow:0 10px 26px -8px var(--blue-glow); }
  button:hover { background:linear-gradient(180deg,var(--blue-bright),var(--blue)); transform:translateY(-1px); }
  button:disabled { opacity:.55; cursor:default; transform:none; }
  .err { color:var(--bad); font-size:13px; margin-top:15px; min-height:18px; text-align:center; }
</style>
</head>
<body>
<form class="card" id="f">
  <div class="brand"><img src="/assets/treelz-logo.svg" alt="treelz" /><h1>treelz<span>.ai</span></h1></div>
  <p class="sub">sign in to your studio</p>
  <label>Username</label>
  <input id="u" autocomplete="username" autofocus />
  <label>Password</label>
  <input id="p" type="password" autocomplete="current-password" />
  <button type="submit" id="btn">Sign in</button>
  <div class="err" id="err"></div>
</form>
<script>
document.getElementById('f').onsubmit = async (e) => {
  e.preventDefault();
  const btn = document.getElementById('btn'), err = document.getElementById('err');
  btn.disabled = true; err.textContent = '';
  try {
    const r = await fetch('/api/login', { method:'POST', headers:{'content-type':'application/json'},
      body: JSON.stringify({ username: document.getElementById('u').value, password: document.getElementById('p').value }) });
    if (!r.ok) { err.textContent = 'Wrong username or password'; btn.disabled = false; return; }
    location.href = '/';
  } catch (_) { err.textContent = 'Something went wrong — try again'; btn.disabled = false; }
};
</script>
</body>
</html>
