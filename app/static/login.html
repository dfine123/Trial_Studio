<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>treelz.ai — sign in</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🌱%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/ui.css?v=2">
<style>
  body { display:flex; align-items:center; justify-content:center; overflow:hidden; }
  /* ambient glow — a blue orb and a purple orb behind the card */
  .orb { position:fixed; border-radius:50%; filter:blur(90px); pointer-events:none; z-index:0; }
  .orb.a { width:420px; height:420px; left:calc(50% - 400px); top:-140px; background:rgba(91,138,255,.12); animation:orb 11s var(--ease) infinite; }
  .orb.b { width:340px; height:340px; right:calc(50% - 430px); bottom:-120px; background:rgba(157,91,255,.10); animation:orb 14s var(--ease) infinite reverse; }
  .card-login { position:relative; z-index:1; width:392px; max-width:92vw; padding:38px 32px 32px; animation:cardIn .5s var(--ease-out) both; }
  .card-login.shake { animation:shake .5s var(--ease); }
  .brand { display:flex; align-items:center; justify-content:center; margin-bottom:5px; }
  .brand h1 { font-size:27px; letter-spacing:-.7px; }
  .brand h1 span { color:var(--acc); text-shadow:0 0 18px var(--acc-glow); }
  .sub { text-align:center; color:var(--muted); font-size:13.5px; margin:4px 0 26px; }
  label { margin:16px 0 7px; }
  input { padding:13px; font-size:15px; }
  .btn-block { margin-top:26px; }
  .err { color:var(--bad); font-size:13px; margin-top:15px; min-height:18px; text-align:center; }
</style>
</head>
<body class="grain">
<div class="orb a"></div><div class="orb b"></div>
<form class="card card-login" id="f">
  <div class="brand"><h1>treelz<span>.ai</span></h1></div>
  <p class="sub">sign in to your studio</p>
  <label for="u">Username</label>
  <input id="u" autocomplete="username" autofocus />
  <label for="p">Password</label>
  <input id="p" type="password" autocomplete="current-password" />
  <button type="submit" class="btn btn-primary btn-block" id="btn">Sign in</button>
  <div class="err" id="err" role="alert"></div>
</form>
<script>
document.getElementById('f').onsubmit = async (e) => {
  e.preventDefault();
  const card = document.getElementById('f'), btn = document.getElementById('btn'), err = document.getElementById('err');
  btn.disabled = true; err.textContent = ''; card.classList.remove('shake');
  btn.innerHTML = '<span class="spin" style="border-color:rgba(255,255,255,.3);border-top-color:#fff"></span>Signing in…';
  try {
    const r = await fetch('/api/login', { method:'POST', headers:{'content-type':'application/json'},
      body: JSON.stringify({ username: document.getElementById('u').value, password: document.getElementById('p').value }) });
    if (!r.ok) {
      err.textContent = 'Wrong username or password';
      btn.disabled = false; btn.textContent = 'Sign in';
      card.classList.add('shake'); return;
    }
    location.href = '/';
  } catch (_) {
    err.textContent = 'Something went wrong — try again';
    btn.disabled = false; btn.textContent = 'Sign in'; card.classList.add('shake');
  }
};
</script>
</body>
</html>
