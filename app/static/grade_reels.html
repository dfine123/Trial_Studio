<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reel grading — treelz.ai</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🌱%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/ui.css?v=1">
<style>
  header { padding:14px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:14px;
    position:sticky; top:0; z-index:5; backdrop-filter:blur(6px); background:rgba(10,12,11,.9); }
  header h1 { font-size:17px; letter-spacing:-.3px; }
  header .count { color:var(--muted); font-size:13px; font-variant-numeric:tabular-nums; }
  header a.link { font-size:12.5px; }
  .wrap { max-width:1080px; margin:0 auto; padding:24px; display:flex; flex-direction:column; gap:22px; }
  .reel { overflow:hidden; display:grid; grid-template-columns:290px 1fr; padding:0; animation:cardIn .4s var(--ease-out) both; }
  @media (max-width:760px){ .reel { grid-template-columns:1fr; } }
  .reel video { width:100%; height:100%; max-height:540px; background:#000; object-fit:contain; }
  .body { padding:20px; display:flex; flex-direction:column; gap:15px; }
  .chosen { background:var(--surface-2); border:1px solid var(--border); border-left:3px solid var(--acc);
    border-radius:var(--r-xs); padding:12px 14px; white-space:pre-wrap; font-size:14.5px; line-height:1.55; margin-top:6px; }
  .alts { display:flex; flex-direction:column; gap:8px; margin-top:6px; }
  .alt { background:var(--bg1); border:1px solid var(--border); border-radius:var(--r-xs); padding:10px 12px;
    color:var(--muted); white-space:pre-wrap; font-size:13.5px; line-height:1.5; }
  .meta { color:var(--muted); font-size:13px; }
  .clips { display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }
  .clips .chip-meta { max-width:260px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  /* 1–10 segmented rating — one click per reel, color encodes the verdict band */
  .rate { display:flex; align-items:center; gap:12px; margin-top:6px; }
  .rate10 { display:flex; gap:4px; flex:1; }
  .r { flex:1; min-width:0; height:36px; font-family:inherit; font-size:13px; font-weight:650; color:var(--muted);
    background:var(--surface-2); border:1px solid var(--border); border-radius:8px; cursor:pointer;
    transition:background var(--t-fast), color var(--t-fast), border-color var(--t-fast), transform var(--t-fast); }
  .r:hover { transform:translateY(-2px); color:var(--ink); border-color:var(--border-2); }
  .r.low.on  { background:var(--bad); color:#2b060c; border-color:transparent; }
  .r.mid.on  { background:#e9eeea; color:#10130f; border-color:transparent; }
  .r.high.on { background:linear-gradient(180deg,#93f8b9,#46d685); color:var(--acc-ink); border-color:transparent;
    box-shadow:0 4px 16px -6px var(--acc-glow); }
  .rval { font-size:20px; font-weight:700; width:62px; text-align:center; font-variant-numeric:tabular-nums; }
  textarea.notes { min-height:84px; font-size:13.5px; }
  .actions { display:flex; gap:10px; align-items:center; }
</style>
</head>
<body class="grain">
<header>
  <h1 id="title">Reel grading</h1>
  <span class="count" id="count"></span>
  <span id="gen"></span>
  <span style="flex:1"></span>
  <a class="link" href="/promote">promote ↗</a>
  <a class="link" href="/grade-reels">production (Opus)</a>
  <a class="link" href="/grade-reels?backend=sonnet">Sonnet&nbsp;5 test</a>
  <a class="link" href="/grade-reels?backend=openai">OpenAI test</a>
  <a class="link" href="/" target="_top">← studio</a>
</header>
<div class="wrap" id="wrap"><div class="empty-block">Loading…</div></div>
<script>
const wrap = document.getElementById('wrap');
const countEl = document.getElementById('count');
let reels = [];

// TEST backends: everything (generation, grading, pending) is scoped to the chosen model via ?backend=,
// which the API routes to an ISOLATED store — production Opus is untouched.
const BK = new URLSearchParams(location.search).get('backend') || '';
const Q = BK ? ('?backend=' + encodeURIComponent(BK)) : '';
const MODELS = { sonnet: 'Claude Sonnet 5', openai: 'OpenAI GPT-5.5' };
if (BK) {
  document.getElementById('title').textContent = 'Reel grading — ' + (MODELS[BK] || BK) + ' · TEST';
  document.getElementById('gen').innerHTML = '<button class="btn btn-primary btn-sm" id="genbtn">+ Generate 3 test reels</button>';
  document.getElementById('genbtn').onclick = generateBatch;
}
async function generateBatch(){
  const btn = document.getElementById('genbtn');
  btn.disabled = true;
  for (let i = 0; i < 3; i++){
    btn.textContent = 'Generating ' + (i + 1) + '/3…';
    try {
      const r = await fetch('/api/generate' + Q, { method:'POST', headers:{'content-type':'application/json'}, body:'{}' });
      if (!r.ok) {
        const d = await r.json().catch(()=>({}));
        btn.textContent = '⚠ ' + ((d.detail || ('HTTP ' + r.status)) + '').slice(0, 90);
        btn.disabled = false; return;   // surface the error instead of spinning silently
      }
    } catch(e){ btn.textContent = '⚠ ' + e; btn.disabled = false; return; }
    await load();
  }
  btn.textContent = '+ Generate 3 test reels'; btn.disabled = false;
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtClips(clips){
  return (clips||[]).map(c => `<span class="chip chip-meta" title="${esc(c.summary||'')}">${esc((c.summary||c.clip_id||'clip').slice(0,46))}</span>`).join('') || '<span class="meta">—</span>';
}
function band(v){ return v <= 4 ? 'low' : (v <= 7 ? 'mid' : 'high'); }
function card(reel){
  const cands = reel.candidates||[];
  const chosen = cands.find(c=>c.chosen) || {text: reel.caption};
  const alts = cands.filter(c=>!c.chosen);
  const altHtml = alts.length
    ? `<div><span class="u-label">Other candidates that were available</span><div class="alts">${alts.map(a=>`<div class="alt">${esc(a.text)}</div>`).join('')}</div></div>`
    : '';
  const el = document.createElement('div');
  el.className = 'card reel';
  el.innerHTML = `
    <video src="${reel.reel_url}" controls preload="metadata"></video>
    <div class="body">
      <div><span class="u-label">Posted caption</span><div class="chosen">${esc(chosen.text||'(blank caption)')}</div></div>
      ${altHtml}
      <div class="meta">&#127925; ${esc((reel.audio&&reel.audio.description)||'audio')}</div>
      <div><span class="u-label">Clips used</span><div class="clips">${fmtClips(reel.clips)}</div></div>
      <div><span class="u-label">Rating</span>
        <div class="rate"><div class="rate10">${Array.from({length:10},(_,k)=>`<button class="r ${band(k+1)}" data-v="${k+1}">${k+1}</button>`).join('')}</div>
        <span class="rval">7<span style="color:var(--faint);font-size:13px;font-weight:600"> /10</span></span></div>
      </div>
      <textarea class="notes" placeholder="Notes — what worked, what didn't, was a different candidate better, did the clips fit… (this is the main signal)"></textarea>
      <div class="actions">
        <button class="btn btn-primary submit">Submit grade</button>
        <button class="btn btn-ghost skip">Skip for now</button>
      </div>
    </div>`;
  let rating = 7;
  const val = el.querySelector('.rval');
  const paint = () => {
    el.querySelectorAll('.r').forEach(b => b.classList.toggle('on', +b.dataset.v === rating));
    val.firstChild.textContent = rating;
    val.style.color = rating <= 4 ? 'var(--bad)' : (rating <= 7 ? 'var(--ink)' : 'var(--acc)');
  };
  el.querySelectorAll('.r').forEach(b => b.onclick = () => { rating = +b.dataset.v; paint(); });
  paint();
  el.querySelector('.submit').onclick = async (e) => {
    e.target.disabled = true;
    const notes = el.querySelector('textarea').value;
    try {
      await fetch('/api/reels/grade' + Q, { method:'POST', headers:{'content-type':'application/json'},
        body: JSON.stringify({ reel_id: reel.reel_id, rating, notes }) });
    } catch(_) {}
    remove(reel.reel_id);
  };
  el.querySelector('.skip').onclick = () => remove(reel.reel_id);
  return el;
}
function remove(id){ reels = reels.filter(r => r.reel_id !== id); render(); }
function render(){
  countEl.textContent = reels.length ? `${reels.length} reel${reels.length>1?'s':''} to grade` : '';
  wrap.innerHTML = '';
  if(!reels.length){
    wrap.innerHTML = `<div class="empty-block">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 9.5h18M7.5 5v14M16.5 5v14"/><path d="M10.6 11l3 1.5-3 1.5z" fill="currentColor"/></svg>
      <div class="empty-title">${BK ? 'No test reels yet' : 'Nothing waiting to be graded'}</div>
      <div class="empty-sub">${BK ? 'Hit “+ Generate 3 test reels” above (this runs the full pipeline on ' + (MODELS[BK]||BK) + ').' : 'Generate some reels in the Studio, then come back — your grades are what the engine learns from.'}</div></div>`;
    return;
  }
  reels.forEach(r => wrap.appendChild(card(r)));
}
async function load(){
  try { reels = await (await fetch('/api/reels/pending' + Q)).json(); }
  catch(_) { reels = []; }
  render();
}
load();
</script>
</body>
</html>
