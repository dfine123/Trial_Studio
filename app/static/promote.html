<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Promote to corpus — treelz.ai</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🌱%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/ui.css?v=2">
<style>
  header { padding:14px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:14px;
    position:sticky; top:0; z-index:5; backdrop-filter:blur(6px); background:rgba(10,11,13,.9); }
  header h1 { font-size:17px; letter-spacing:-.3px; }
  .sub { color:var(--muted); font-size:12.5px; }
  header a.link { margin-left:auto; font-size:12.5px; }
  .wrap { max-width:860px; margin:0 auto; padding:24px; display:flex; flex-direction:column; gap:14px; }
  .row { padding:16px 18px; display:flex; gap:16px; align-items:center; animation:cardIn .4s var(--ease-out) both; }
  .cap { flex:1; white-space:pre-wrap; font-size:14.5px; line-height:1.55; }
  .rating { font-weight:700; font-size:17px; color:var(--good); width:64px; text-align:center; flex:none;
    font-variant-numeric:tabular-nums; text-shadow:0 0 16px rgba(70,201,138,.4); }
</style>
</head>
<body class="grain">
<header>
  <h1>Promote to corpus</h1>
  <span class="sub">your 9–10 rated lines → new references (the voice compounds from your wins)</span>
  <a class="link" href="/grade-reels">← reel grading</a>
</header>
<div class="wrap" id="wrap"><div class="empty-block">Loading…</div></div>
<script>
const wrap = document.getElementById('wrap');
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
async function load(){
  let rows = [];
  try { rows = (await (await fetch('/api/corpus/promotable')).json()).promotable || []; } catch(_){}
  wrap.innerHTML = '';
  if(!rows.length){
    wrap.innerHTML = `<div class="empty-block">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5l4.5 4.5L19 7"/></svg>
      <div class="empty-title">Nothing waiting</div>
      <div class="empty-sub">Every 9–10 you've graded is already in the corpus — the learn loop promotes them automatically.</div></div>`;
    return;
  }
  rows.forEach(r => {
    const el = document.createElement('div');
    el.className = 'card row';
    el.innerHTML = `<div class="rating">${r.rating}/10</div><div class="cap">${esc(r.caption)}</div><button class="btn btn-primary btn-sm">Promote</button>`;
    el.querySelector('button').onclick = async (e) => {
      e.target.disabled = true; e.target.textContent = 'Promoting…';
      try {
        const res = await fetch('/api/corpus/promote', { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify({ reel_id: r.reel_id }) });
        if (res.ok) { el.remove(); if(!wrap.children.length) load(); return; }
        e.target.textContent = '⚠ failed';
      } catch(_) { e.target.textContent = '⚠ failed'; }
      e.target.disabled = false;
    };
    wrap.appendChild(el);
  });
}
load();
</script>
</body>
</html>
